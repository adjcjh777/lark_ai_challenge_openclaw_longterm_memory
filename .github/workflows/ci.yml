name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COPILOT_SKIP_LOCAL_ENV: "1"
  COPILOT_AUTO_INIT_COGNEE: "0"
  EMBEDDING_PROVIDER: deterministic

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Code Quality Checks
  # ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: python3 -m compileall memory_engine scripts -q

      - name: Git diff check (whitespace)
        run: git diff --check

      - name: Lint with ruff
        run: ruff check memory_engine scripts tests

      - name: Format check with ruff
        run: ruff format --check memory_engine scripts tests

      - name: Type check with mypy
        run: mypy memory_engine --ignore-missing-imports --no-error-summary
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Job 2: Unit Tests (matrix across Python versions)
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          python -m coverage run -m unittest discover tests/ -v
          python -m coverage xml -o coverage.xml
          python -m coverage report --fail-under=70

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # Job 3: Integration Tests
  # ──────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Healthcheck
        run: python3 scripts/check_copilot_health.py --json

      - name: Demo readiness
        run: python3 scripts/check_demo_readiness.py --json

      - name: Admin graph quality gate
        run: python3 scripts/check_copilot_graph_quality.py --json

  # ──────────────────────────────────────────────
  # Job 4: Admin / Static Knowledge Site UI Smoke
  # ──────────────────────────────────────────────
  ui-smoke:
    name: Admin UI Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.59.1 install --with-deps chromium

      - name: Run Copilot Admin UI smoke
        run: |
          rm -rf /tmp/copilot-admin-ui-smoke
          python3 scripts/check_copilot_admin_ui_smoke.py \
            --output-dir /tmp/copilot-admin-ui-smoke \
            --json
          rm -rf /tmp/copilot-admin-ui-baseline /tmp/copilot-admin-ui-baseline-update /tmp/copilot-admin-ui-baseline-compare
          python3 scripts/check_copilot_admin_ui_smoke.py \
            --output-dir /tmp/copilot-admin-ui-baseline-update \
            --visual-baseline-dir /tmp/copilot-admin-ui-baseline \
            --update-visual-baseline \
            --json
          python3 scripts/check_copilot_admin_ui_smoke.py \
            --output-dir /tmp/copilot-admin-ui-baseline-compare \
            --visual-baseline-dir /tmp/copilot-admin-ui-baseline \
            --json

      - name: Upload UI smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-admin-ui-smoke
          path: |
            /tmp/copilot-admin-ui-smoke/*.png
            /tmp/copilot-admin-ui-baseline/*.png
            /tmp/copilot-admin-ui-baseline/visual-baseline.json
            /tmp/copilot-admin-ui-baseline-compare/*.png
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Job 5: Benchmark Tests
  # ──────────────────────────────────────────────
  benchmark:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run recall benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_recall_cases.json

      - name: Run candidate benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_candidate_cases.json

      - name: Run conflict benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_conflict_cases.json

      - name: Run layer benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_layer_cases.json

      - name: Run prefetch benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_prefetch_cases.json

      - name: Run heartbeat benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_heartbeat_cases.json

  # ──────────────────────────────────────────────
  # Job 6: Security & Dependency Scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit dependencies
        run: pip-audit --desc
        continue-on-error: true

      - name: Check license compatibility
        run: |
          pip install pip-licenses
          pip-licenses --format=table --with-urls --ignore-packages cognee
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Job 7: OpenClaw Validation
  # ──────────────────────────────────────────────
  openclaw:
    name: OpenClaw Validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: OpenClaw version check
        run: python3 scripts/check_openclaw_version.py

      - name: Validate OpenClaw schema
        run: |
          python3 - <<'PY'
          import json
          import sys

          schema_path = 'agent_adapters/openclaw/memory_tools.schema.json'
          try:
              with open(schema_path) as f:
                  data = json.load(f)
              assert data.get('openclaw_version') == '2026.4.24', 'Unexpected OpenClaw version'
              assert isinstance(data.get('tools'), list) and data['tools'], 'Schema must define tools'
              for tool in data['tools']:
                  assert isinstance(tool, dict), 'Tool entries must be objects'
                  assert tool.get('name'), 'Tool missing name'
                  assert isinstance(tool.get('input_schema'), dict), f"Tool {tool.get('name')} missing input_schema"
              assert '$defs' in data or 'definitions' in data, 'Schema missing reusable definitions'
              print(f"Schema valid: {schema_path} ({len(data['tools'])} tools)")
          except Exception as e:
              print(f'Schema validation failed: {e}', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate OpenClaw plugin manifest
        run: |
          python3 - <<'PY'
          import json
          import sys

          manifest_path = 'agent_adapters/openclaw/plugin/openclaw.plugin.json'
          try:
              with open(manifest_path) as f:
                  data = json.load(f)
              assert 'name' in data, 'Plugin manifest missing name'
              manifest_name = data.get('name', 'unknown')
              print(f'Plugin manifest valid: {manifest_name}')
          except Exception as e:
              print(f'Plugin manifest validation failed: {e}', file=sys.stderr)
              sys.exit(1)
          PY

  # ──────────────────────────────────────────────
  # Job 8: Build
  # ──────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          python3 -c "
          import glob, sys
          wheels = glob.glob('dist/*.whl')
          sdists = glob.glob('dist/*.tar.gz')
          if not wheels:
              print('No wheel found', file=sys.stderr)
              sys.exit(1)
          if not sdists:
              print('No sdist found', file=sys.stderr)
              sys.exit(1)
          print(f'Wheel: {wheels[0]}')
          print(f'Sdist: {sdists[0]}')
          "

      - name: Verify wheel can be installed
        run: |
          pip install dist/*.whl --target /tmp/verify_install --no-deps
          python3 -c "
          import sys
          sys.path.insert(0, '/tmp/verify_install')
          import importlib
          try:
              importlib.import_module('memory_engine')
              print('Package importable: OK')
          except ImportError as e:
              print(f'Import failed: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
