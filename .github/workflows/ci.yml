name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Code Quality Checks
  # ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: python3 -m compileall memory_engine scripts -q

      - name: Git diff check (whitespace)
        run: git diff --check

      - name: Lint with ruff
        run: ruff check memory_engine scripts tests

      - name: Format check with ruff
        run: ruff format --check memory_engine scripts tests

      - name: Type check with mypy
        run: mypy memory_engine --ignore-missing-imports --no-error-summary
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Job 2: Unit Tests (matrix across Python versions)
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          coverage run -m unittest discover tests/ -v
          coverage xml -o coverage.xml
          coverage report --fail-under=70

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # Job 3: Integration Tests
  # ──────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Healthcheck
        run: python3 scripts/check_copilot_health.py --json

      - name: Demo readiness
        run: python3 scripts/check_demo_readiness.py --json

  # ──────────────────────────────────────────────
  # Job 4: Benchmark Tests
  # ──────────────────────────────────────────────
  benchmark:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run recall benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_recall_cases.json

      - name: Run candidate benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_candidate_cases.json

      - name: Run conflict benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_conflict_cases.json

      - name: Run layer benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_layer_cases.json

      - name: Run prefetch benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_prefetch_cases.json

      - name: Run heartbeat benchmark
        run: python3 -m memory_engine benchmark run benchmarks/copilot_heartbeat_cases.json

  # ──────────────────────────────────────────────
  # Job 5: Security & Dependency Scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit dependencies
        run: pip-audit --desc
        continue-on-error: true

      - name: Check license compatibility
        run: |
          pip install pip-licenses
          pip-licenses --format=table --with-urls --ignore-packages cognee
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Job 6: OpenClaw Validation
  # ──────────────────────────────────────────────
  openclaw:
    name: OpenClaw Validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: OpenClaw version check
        run: python3 scripts/check_openclaw_version.py

      - name: Validate OpenClaw schema
        run: |
          python3 -c "
          import json, sys
          schema_path = 'agent_adapters/openclaw/memory_tools.schema.json'
          try:
              with open(schema_path) as f:
                  data = json.load(f)
              assert 'type' in data or '$defs' in data or 'definitions' in data, 'Invalid schema structure'
              print(f'Schema valid: {schema_path}')
          except Exception as e:
              print(f'Schema validation failed: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Validate OpenClaw plugin manifest
        run: |
          python3 -c "
          import json, sys
          manifest_path = 'agent_adapters/openclaw/plugin/openclaw.plugin.json'
          try:
              with open(manifest_path) as f:
                  data = json.load(f)
              assert 'name' in data, 'Plugin manifest missing name'
              print(f'Plugin manifest valid: {data.get(\"name\", \"unknown\")}')
          except Exception as e:
              print(f'Plugin manifest validation failed: {e}', file=sys.stderr)
              sys.exit(1)
          "

  # ──────────────────────────────────────────────
  # Job 7: Build
  # ──────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          python3 -c "
          import glob, sys
          wheels = glob.glob('dist/*.whl')
          sdists = glob.glob('dist/*.tar.gz')
          if not wheels:
              print('No wheel found', file=sys.stderr)
              sys.exit(1)
          if not sdists:
              print('No sdist found', file=sys.stderr)
              sys.exit(1)
          print(f'Wheel: {wheels[0]}')
          print(f'Sdist: {sdists[0]}')
          "

      - name: Verify wheel can be installed
        run: |
          pip install dist/*.whl --target /tmp/verify_install --no-deps
          python3 -c "
          import sys
          sys.path.insert(0, '/tmp/verify_install')
          import importlib
          try:
              importlib.import_module('memory_engine')
              print('Package importable: OK')
          except ImportError as e:
              print(f'Import failed: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
